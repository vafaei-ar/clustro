experiment:
  name: "stroke_deep_v1"
  output_dir: "./results/stroke_deep_v1"
  random_seed: 2026
  use_gpu_if_available: false
  deterministic_mode: "fast"

data:
  path: "./data/stroke.csv"
  id_column: "patient_id"
  target_columns: []
  column_schema:
    continuous: ["age", "bmi", "glucose", "sbp", "dbp"]
    binary: ["sex_male", "smoker", "hypertension"]
    categorical: ["race", "insurance_type"]
    ordinal: []

search:
  pilot_sample_fraction: 0.35
  pilot_min_rows: 200
  seeds_pilot: [101]
  seeds_full: [101, 102, 103]
  perturbations_full: 3
  perturbation_type: "bootstrap"
  optuna:
    enabled: false

preprocessing:
  continuous_transforms: ["standard"]
  categorical_encoding: ["onehot"]

representation:
  methods:
    - name: "none"
    - name: "autoencoder"
      params:
        latent_dim: [5, 8]
        hidden_layers:
          - [64, 32]
          - [128, 64]
        dropout: [0.0, 0.1]
        epochs: 50
        batch_size: 128
        learning_rate: [0.001]
        early_stopping_patience: 5

clustering:
  methods:
    - name: "ae_kmeans"
      params:
        n_clusters: [2, 3, 4, 5]
        latent_dim: [5, 8]
        hidden_layers:
          - [64, 32]
          - [128, 64]
        epochs: 50
        batch_size: 128
        learning_rate: [0.001]
        early_stopping_patience: 5
    - name: "ae_gmm"
      params:
        n_components: [2, 3, 4, 5]
        latent_dim: [5, 8]
        hidden_layers:
          - [64, 32]
          - [128, 64]
        covariance_type: ["diag"]
        epochs: 50
        batch_size: 128
        learning_rate: [0.001]
        early_stopping_patience: 5
    # Autoencoder + frozen-encoder centroid refinement (not full DEC).
    - name: "ae_centroid_refinement"
      params:
        n_clusters: [2, 3, 4, 5]
        latent_dim: [5, 8]
        hidden_layers:
          - [64, 32]
          - [128, 64]
        pretrain_epochs: 50
        finetune_epochs: 25
        finetune_patience: 5
        batch_size: 128
        learning_rate: [0.001]
    # VAE + post-hoc GMM (not full VaDE).
    - name: "vae_gmm"
      params:
        n_clusters: [2, 3, 4, 5]
        latent_dim: [5, 8]
        hidden_layers:
          - [64, 32]
          - [128, 64]
        epochs: 50
        batch_size: 128
        learning_rate: [0.001]

evaluation:
  internal_metrics: ["silhouette", "davies_bouldin", "calinski_harabasz"]
  structure_constraints:
    min_clusters: 2
    max_clusters: 8
    min_cluster_fraction: 0.03
    max_noise_fraction: 0.35
    dominant_cluster_cap: 0.85
  acceptance:
    hard_thresholds:
      silhouette_min: 0.0
      ari_seed_min: 0.1
      nmi_seed_min: 0.1
      mean_cluster_jaccard_min: 0.1
    weighted_score:
      silhouette: 0.15
      davies_bouldin: -0.05
      calinski_harabasz: 0.05
      ari_seed: 0.25
      nmi_seed: 0.20
      mean_cluster_jaccard: 0.20
      cluster_balance: 0.10
      average_confidence: 0.10
      assignment_entropy: 0.08
      reconstruction_loss: 0.04
      runtime: 0.05
      parsimony: 0.03

interpretation:
  surrogate_model: "xgboost"
  cross_validation_folds: 5
  repeated_cv_repeats: 3
  use_shap: true
  use_permutation_importance: true
  top_n_features: 30
  grouped_correlation_threshold: 0.85
