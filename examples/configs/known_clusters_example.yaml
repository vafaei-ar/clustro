experiment:
  name: "known_clusters_v1"
  output_dir: "./results/known_clusters_v1"
  random_seed: 42
  n_jobs: 1
  use_ray: false
  use_mlflow: false
  use_gpu_if_available: false

data:
  path: "../data/known_clusters.csv"
  id_column: "patient_id"
  # true_cluster and outcome_90d are metadata only — not in column_schema.
  target_columns: ["true_cluster", "outcome_90d"]
  column_schema:
    continuous: ["age", "albumin", "crp", "creatinine"]
    binary: ["sex_male", "diabetes"]
    categorical: ["hospital", "stroke_type"]
    ordinal: ["severity_group"]
  ordinal_maps:
    severity_group: ["mild", "moderate", "severe"]
  missingness:
    continuous_imputer: "median"
    categorical_imputer: "most_frequent"
    add_missing_indicators: true

search:
  pilot_sample_fraction: 1.0
  pilot_min_rows: 60
  seeds_pilot: [101]
  seeds_full: [101, 102, 103]
  perturbations_full: 2
  perturbation_type: "bootstrap"
  optuna:
    enabled: false

preprocessing:
  continuous_transforms: ["standard"]
  categorical_encoding: ["onehot"]

representation:
  methods:
    - name: "none"

clustering:
  methods:
    - name: "kmeans"
      params:
        n_clusters: [3]
    - name: "gmm"
      params:
        n_components: [3]
        covariance_type: ["diag"]
    - name: "agglomerative"
      params:
        n_clusters: [3]
        linkage: ["ward"]

evaluation:
  internal_metrics: ["silhouette", "davies_bouldin", "calinski_harabasz"]
  structure_constraints:
    min_clusters: 2
    max_clusters: 5
    min_cluster_fraction: 0.03
    max_noise_fraction: 0.35
    dominant_cluster_cap: 0.85
  acceptance:
    # Permissive thresholds: the dataset is very separable so all candidates should pass.
    hard_thresholds:
      silhouette_min: -1.0
      ari_seed_min: 0.0
      nmi_seed_min: 0.0
      mean_cluster_jaccard_min: 0.0
    weighted_score:
      silhouette: 0.25
      davies_bouldin: 0.10
      calinski_harabasz: 0.10
      ari_seed: 0.30
      nmi_seed: 0.10
      mean_cluster_jaccard: 0.10
      cluster_balance: 0.05

consensus:
  include_only_accepted: true
  run_weighting:
    source: "final_weighted_score"
    normalize: true
    floor: 0.01
  consensus_method: "hierarchical_on_coassociation"
  final_k_strategy: "weighted_mode"

interpretation:
  surrogate_model: "random_forest"
  cross_validation_folds: 3
  repeated_cv_repeats: 1
  use_shap: false
  use_permutation_importance: false
  top_n_features: 10

reporting:
  generate_figures: false
  generate_tables: true
  manuscript_bundle: true
